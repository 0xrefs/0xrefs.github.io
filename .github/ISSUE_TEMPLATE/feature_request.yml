name: Feature request
description: Suggest an improvement to the site itself (not a command).
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For requesting a new **command**, use the Command request template instead.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is missing or awkward today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
