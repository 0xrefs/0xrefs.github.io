name: Bug report
description: Something on the site is broken or wrong.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: Describe the bug. If a specific command is wrong, link or name it.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: false
  - type: input
    id: env
    attributes:
      label: Browser / OS
      placeholder: Firefox 126 on Linux
    validations:
      required: false
